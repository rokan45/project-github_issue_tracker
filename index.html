<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
    <title>Git Issue Tracker</title>
    <link rel="shortcut icon" href="./images/github-logo.png" type="image/x-icon">
    <!-- External css file link -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- Taiwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body class="min-h-screen flex items-center justify-center bg-gray-100">
    <!-- Login Form -->
    <section class="w-full max-w-md">
        <div class="form pt-2">
            <div class=" w-full max-w-sm bg-white shrink-0 mx-auto shadow-sm rounded-md">
                <div class="card-body">
                    <!-- logo div -->
                    <div class="flex flex-col justify-center items-center text-center mb-2">
                        <img src="images/github-logo.png" alt="">
                        <h2 class="text-2xl font-semibold mt-2">GitHub Issues Tracker</h2>
                        <p class="text-sm text-[#64748B] mt-1">Sign in to manage your issues</p>
                    </div>

                    <fieldset class="fieldset">
                        <label class="label text-[16px] font-medium text-[#080808]">Username</label>
                        <input id="username" type="email" class="w-full input rounded-md bg-[#F4F5F7]"
                            placeholder="Default: admin" />
                        <label class="label text-[16px] font-medium text-[#080808]">Password</label>
                        <input id="input-pass" type="password" class=" w-full input rounded-md bg-[#F4F5F7]"
                            placeholder="Default: admin123" />
                        <button id="sign-in-btn" class="btn btn-primary mt-4 rounded-md w-full h-[45px]">Sign
                            In</button>
                    </fieldset>
                    <div class="flex items-center my-1">
                        <hr class="grow border-gray-300">
                        <span class="mx-4 text-gray-500 font-medium">OR</span>
                        <hr class="grow border-gray-300">
                    </div>
                    <p class="text-sm py-1 text-gray-500 text-center">Demo Credentials:</p>
                    <div class="flex flex-col items-center justify-center bg-gray-100 py-5 rounded-sm">
                        <p>Username: admin</p>
                        <p>Password: admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="script/sign-in.js"></script>
</body>

</html>
