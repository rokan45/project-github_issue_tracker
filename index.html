<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
    <title>Payoo Login</title>
    <!-- External css file link -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- Taiwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="mx-auto w-[200px] pt-32 ">
        <img src="images/github-logo.png" alt="">
    </div>


    <!-- Login Form -->
    <div class="form pt-8">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto shadow-sm rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-[16px] font-medium text-[#080808]">Username</label>
                    <input id="input-number" type="email" maxlength="11" minlength="11"
                        class="input rounded-4xl bg-[#F4F5F7]" placeholder="Enter your number" value="01711111111" />
                    <label class="label text-[16px] font-medium text-[#080808]">Password</label>
                    <input id="input-pin" type="password" maxlength="4" class="input rounded-4xl bg-[#F4F5F7]"
                        placeholder="Enter 4 Digit Pin" />
                    <button id="login-btn" class="btn btn-primary mt-4 rounded-4xl w-[320px] h-[45px]">Sign In</button>
                </fieldset>
            </div>
        </div>
    </div>

    <script src="script/login.js"></script>
</body>

</html>
