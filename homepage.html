<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/github-logo.png" type="image/x-icon">

    <title>Git Issue Tracker</title>
    <!-- External css file link -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- Taiwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body>
    <!-- Navbar section -->
    <header>
        <div class="navbar flex mx-auto px-5 items-center bg-base-100 shadow-sm">
            <div class="navbar-start">
                <a class="flex items-center gap-2">
                    <img src="./images/github-logo.png" alt="" width="36px" height="36px">
                    <span class="hidden sm:inline text-2xl font-semibold sm:">GitHub Issues Tracker</span>
                </a>
            </div>
            <div class="navbar-end join flex item-center mx-auto">
                <div>
                    <label class="input validator join-item">
                        <input id="input-search" type="search" placeholder="Search Issues.." required />
                    </label>
                </div>
                <button id="btn-search" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <!-- Tab section -->
    <section class="w-11/12 mx-auto py-5 mt-5">
        <div class="border-none shadow-lg py-5 space-x-3 px-5">
            <button onclick="setActiveButton('all-btn')" id="all-btn" class="btn active">All</button>
            <button onclick="setActiveButton('open-btn')" id="open-btn" class="btn ">Open</button>
            <button onclick="setActiveButton('closed-btn')" id="closed-btn" class="btn ">Closed</button>

        </div>
    </section>

    <!-- Number of Issue section -->
    <section class="w-11/12 mx-auto py-5 mt-5 flex items-center justify-between shadow-md px-5">
        <!-- number content -->
        <div class="flex gap-4">
            <img src="./images/Aperture.png" alt="" width="50px" height="50px">
            <div>
                <h2 class="text-2xl font-semibold"><span id="number">50</span> Issues</h2>
                <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
            </div>
        </div>
        <!-- open closed sign -->
        <div class="flex items-center space-x-2.5">
            <h2><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h2>
            <h2><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h2>
        </div>
    </section>

    <!-- Loading spinner -->
    <section id="spinner" class="flex justify-center items-center mt-4 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>


    <!-- Issue container section -->
    <section id="issue-container" class="w-11/12  mx-auto grid grid-cols-1 gap-y-10 gap-x-5 py-10 md:grid-cols-2 lg:grid-cols-4">
        <!-- issue card -->
        <!-- <div class="p-4 rounded-sm shadow-sm w-full max-w-sm">
            <div class="flex justify-between items-center mb-3">
               <div></div>
                <button class="btn rounded-4xl">High</button>
            </div>
            <h2 class="text-sm font-semibold mb-2">Fix navigation menu on mobile devices</h2>
            <p class="text-sm text-[#64748B] text-wrap">The navigation menu doesn't collapse properly on mobile
                devices...</p>

            <div class="felx flex-wrap items-center mt-3 space-x-4">
                <button class="btn btn-soft">Bug</button>
                <button class="btn btn-soft">Bug</button>
            </div>
            <hr class="border-[#E4E4E7] mt-2">
            <div class="p-4 space-y-2">
                <h2 class="text-sm text-[#64748B]">#1 by john_doe</h2>
                <h2 class="text-sm text-[#64748B] mb-2">1/15/2024</h2>
            </div>

        </div> -->
    </section>

    <!-- Modal section -->
    <section>
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div id="issue-details-card" class="modal-box p-4">
                <h2 class="text-3xl font-semibold">Fix broken image uploads</h2>
                <ul class="flex items-center gap-3 mt-2">
                    <li><button class="btn rounded-2xl bg-[#00A96E] text-white p-1">Opend</button></li>
                    <li>
                        <p class="text-[#64748B] text-sm">Opened by Fahim Ahmed</p>
                    </li>
                    <li>
                        <p class="text-[#64748B] text-sm">22/02/2026</p>
                    </li>
                </ul>
                <!-- labels -->
                <div class="felx flex-wrap items-center mt-3 space-x-2">
                    <!-- ${createElements(issue.labels)} -->
                    <button class="btn">bug</button>
                    <button class="btn">bug</button>
                </div>

                <p class="text-[#64748B] text-sm mt-3">The navigation menu doesn't collapse properly on mobile devices.
                    Need to fix the responsive behavior.</p>
                <div class="flex mx-auto items-center p-5 bg-gray-200 mt-5 rounded-sm">
                    <div class="flex-1">
                        <p class="text-[#64748B] text-sm mb-1">Assignee:</p>
                        <h2 class="text-sm font-semibold text-black">Fahim Ahmed</h2>
                    </div>
                    <div class="flex-1">
                        <p class="text-[#64748B] text-sm mb-1">Priority</p>
                        <button class="btn rounded-lg bg-[#EF4444] text-white p-1">High</button>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>

    <script src="./script/main.js"></script>
</body>

</html>
