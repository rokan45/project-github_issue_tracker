<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/github-logo.png" type="image/x-icon">

    <title>Git Issue Tracker</title>
    <!-- External css file link -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- Taiwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>


<body>
    <!-- Navbar section -->
    <header>
        <div class="navbar flex mx-auto px-5 items-center bg-base-100 shadow-sm">
            <div class="navbar-start">
                <a class="flex items-center gap-2">
                    <img src="./images/github-logo.png" alt="" width="36px" height="36px">
                    <span class="hidden sm:inline text-2xl font-semibold sm:">GitHub Issues Tracker</span>
                </a>
            </div>
            <div class="navbar-end join flex item-center mx-auto">
                <div>
                    <label class="input validator join-item">
                        <input id="input-search" type="search" placeholder="Search Issues.." required />
                    </label>
                </div>
                <button id="btn-search" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <!-- Tab section -->
    <section class="w-11/12 mx-auto py-5 mt-5">
        <div class="border-none shadow-lg py-5 space-x-3 px-5">
            <button class="btn btn-primary">All</button>
            <button class="btn btn-primary">Open</button>
            <button class="btn btn-primary">Closed</button>

        </div>
    </section>

    <!-- Number of Issue section -->
    <section class="w-11/12 mx-auto py-5 mt-5 flex items-center justify-between shadow-md px-5">
        <!-- number content -->
        <div class="flex gap-4">
            <img src="./images/Aperture.png" alt="" width="50px" height="50px">
            <div>
                <h2 class="text-2xl font-semibold"><span>50</span> Issues</h2>
                <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
            </div>
        </div>
        <!-- open closed sign -->
        <div class="flex items-center space-x-2.5">
            <h2><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h2>
            <h2><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h2>
        </div>
    </section>

    <!-- Issue container section -->
    <section id="issue-container" class="w-11/12  mx-auto grid grid-cols-3 gap-2.5 py-10">
        <!-- issue card -->
        <!-- <div class="p-4 rounded-sm shadow-sm w-full max-w-sm">

            </div>

            </div>

</body>
